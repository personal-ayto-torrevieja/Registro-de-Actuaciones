<input class="input" id="descripcion" list="listaDescripcion" placeholder="Detalle de la actuación" type="text"/>
<datalist id="listaDescripcion"></datalist>
<div class="form-row">
<div>
<label class="label">Zona</label>
<input class="input" id="zona" list="listaZona" placeholder="Ej. Sala, Pasillo..." type="text"/>
<datalist id="listaZona"></datalist>
</div>
<div>
<label class="label">Nº de Actuaciones</label>
<div style="position:relative;">
<input class="input number-input" id="numeroActuaciones" min="1" placeholder="Número de actuaciones" step="1" type="number" value="1"/>
<div style="position:absolute; right:10px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:2px; z-index:5;">
<button onclick="document.getElementById('numeroActuaciones').stepUp()" style="background:transparent; border:none; color:#64748b; cursor:pointer; padding:0; line-height:10px; font-size:10px; display:flex; align-items:center; justify-content:center;" type="button">
<i class="fa-solid fa-chevron-up"></i>
</button>
<button onclick="document.getElementById('numeroActuaciones').stepDown()" style="background:transparent; border:none; color:#64748b; cursor:pointer; padding:0; line-height:10px; font-size:10px; display:flex; align-items:center; justify-content:center;" type="button">
<i class="fa-solid fa-chevron-down"></i>
</button>
</div>
</div>
</div>
</div>
<label class="label">Factor</label>
<div style="position:relative;">
<i class="fa-solid fa-tasks" style="position:absolute; left:14px; top:50%; transform:translateY(-50%); color:#64748b; font-size:16px; pointer-events:none; z-index:2;"></i>
<div style="position:absolute; left:38px; top:50%; transform:translateY(-50%); width:1px; height:20px; background:#cbd5e1; z-index:2; pointer-events:none;"></div>
<select class="select" id="factor" style="padding-left:45px; align-items:center; padding-right:50px; height:42px; font-size:14px; cursor:pointer;">
<option>1.1: Actividad Extraordinaria</option>
<option>1.2: Funciones Adicionales</option>
<option>1.3: Iniciativa y Mejora grupal</option>
<option>1.4: Especial Atn. al Servicio</option>
<option>Plan de Actuación Pendiente</option>
</select>
<i class="fa-solid fa-chevron-down" style="position:absolute; right:18px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none;"></i>
</div>
<div class="buttons">
<div class="btn-row">
<button class="btn add" onclick="agregarRegistro()">
<i class="fa-solid fa-circle-plus"></i> Añadir
</button>
<button class="btn delete" onclick="eliminarSeleccionado()">
<i class="fa-regular fa-trash-can"></i> Eliminar
</button>
</div>
<button class="btn order full" onclick="ordenarPorFecha()">
<i class="fa-solid fa-arrow-down-1-9"></i> Ordenar por Fecha
</button>
<div class="btn-row">
<button class="btn save" onclick="guardarDatos(true)">
<i class="fa-solid fa-cloud-arrow-down"></i> Backup
</button>
<button class="btn restore" onclick="document.getElementById('inputRestaurar').click()">
<i class="fa-solid fa-cloud-arrow-up"></i> Restaurar
</button>
</div>
<input accept=".json" id="inputRestaurar" onchange="restaurarCopia(event)" style="display:none" type="file"/>
</div>
</div>
<div class="content">
<input class="search" id="busqueda" placeholder="Buscar registros..." type="text"/>
<div class="table-container">
<table>
<thead>
<tr>
<th style="width:105px">Fecha(s)</th>
<th style="width:225px">Actuación</th>
<th style="width:235px">Factor</th>
<th style="width:300px">Descripción</th>
<th style="width:160px">Zona</th>
<th style="width:130px">Actos</th>
</tr>
</thead>
<tbody id="tablaBody"></tbody>
</table>
</div>
<div class="footer">
<div id="contador" style="font-weight: 700; color: #1e293b;">Total registros: 0</div>
<div class="stats">Sistema listo con autocompletado inteligente</div>
</div>
</div>
</div>

<script>
let registros = JSON.parse(localStorage.getItem('registros')) || [];
let filaSeleccionada = null;
let usarPeriodo = false;

function formatearFecha(fechaISO){
    if(!fechaISO) return '';
    if(fechaISO.includes(' a ')){
        const partes = fechaISO.split(' a ');
        return partes.map(f => f ? new Date(f).toLocaleDateString('es-ES') : '').join(' - ');
    }
    const d = new Date(fechaISO);
    if(isNaN(d)) return '';
    return d.toLocaleDateString('es-ES');
}

const actuacionesPorFactor = {
    '1.1: Actividad Extraordinaria': [
        'Gestión sanitaria básica', 'Supervisión del alumnado', 'Comunicación con familias',
        'Gestión de objetos perdidos', 'Recepción y entrega de materiales personales',
        'Colocación de vallas en la calle'
    ],
    '1.2: Funciones Adicionales': [
        'Organización de eventos', 'Adecuación de aulas', 'Instalación de equipamiento',
        'Apoyo administrativo', 'Control de sistemas', 'Apoyo en limpieza',
        'Primeros auxilios', 'Gestión de residuos', 'Control de suministros'
    ],
    '1.3: Iniciativa y Mejora grupal': [
        'Participación en reuniones y coordinación interna', 'Propuestas de mejora del servicio de conserjería',
        'Gestión de incidencias del profesorado', 'Coordinación con dirección y personal municipal',
        'Mejora en la gestión de llaves y accesos'
    ]
};

window.addEventListener("load", () => {
    renderTabla();
    actualizarSugerencias();
    inicializarActuacionesFijas();
    filtrarUltimoDia();
});

function inicializarActuacionesFijas(){
    const lista = document.getElementById('listaActuacion');
    const actuacionesUnicas = [
        ...new Set([
            ...Object.values(actuacionesPorFactor).flat(),
            ...registros.map(r => r.actuacion).filter(Boolean)
        ])
    ];
    lista.innerHTML = '';
    actuacionesUnicas.forEach(actuacion => {
        const option = document.createElement('option');
        option.value = actuacion;
        lista.appendChild(option);
    });
}

function detectarFactorAutomatico(){
    const actuacion = document.getElementById('actuacion').value.trim();
    const selectFactor = document.getElementById('factor');
    for(const factor in actuacionesPorFactor){
        if(actuacionesPorFactor[factor].includes(actuacion)){
            selectFactor.value = factor;
            return;
        }
    }
}

document.getElementById('actuacion').addEventListener('input', detectarFactorAutomatico);

const btnDiaUnico = document.getElementById('btnDiaUnico');
const btnPeriodo = document.getElementById('btnPeriodo');
const bloquePeriodo = document.getElementById('bloquePeriodo');
const bloqueDiaUnico = document.getElementById('bloqueDiaUnico');

btnDiaUnico.addEventListener('click', () => {
    usarPeriodo = false;
    btnDiaUnico.classList.add('active');
    btnPeriodo.classList.remove('active');
    bloquePeriodo.classList.remove('mostrar');
    bloqueDiaUnico.style.display = 'block';
    document.getElementById('numeroActuaciones').value = '1';
});

btnPeriodo.addEventListener('click', () => {
    usarPeriodo = true;
    btnPeriodo.classList.add('active');
    btnDiaUnico.classList.remove('active');
    bloquePeriodo.classList.add('mostrar');
    bloqueDiaUnico.style.display = 'none';
});

function agregarRegistro(){
    const fecha = document.getElementById('fecha').value;
    const fechaInicio = document.getElementById('fechaInicio').value;
    const fechaFin = document.getElementById('fechaFin').value;
    const actuacion = document.getElementById('actuacion').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const zona = document.getElementById('zona').value.trim();
    const numeroActuaciones = document.getElementById('numeroActuaciones').value || '1';
    const factor = document.getElementById('factor').value;

    if (usarPeriodo) {
        if(!fechaInicio || !fechaFin){
            alert('Debes completar el período');
            return;
        }
    } else {
        if(!fecha){
            alert('Debes seleccionar una fecha');
            return;
        }
    }
    if(!actuacion){
        alert('Debes introducir una actuación');
        return;
    }

    registros.push({
        fecha: usarPeriodo ? `${fechaInicio} a ${fechaFin}` : fecha,
        actuacion,
        factor,
        descripcion,
        zona,
        numeroActuaciones
    });

    guardarDatos();
    renderTabla();
    actualizarSugerencias();
    limpiarCampos();
}


function escaparHTML(texto){
    if(!texto) return '';
    return String(texto).replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    }[m]));
}
function renderTabla(){
    const body = document.getElementById('tablaBody');
    body.innerHTML = '';

    registros.forEach((r,index) => {
        const tr = document.createElement('tr'); tr.dataset.index = index;
        tr.innerHTML = `
            <td><b>${formatearFecha(r.fecha)}</b></td>
            <td>${escaparHTML(r.actuacion)}</td>
            <td>${r.factor}</td>
            <td>${escaparHTML(r.descripcion)}</td>
            <td><span style="background:transparent; padding:4px 8px; border-radius:4px; font-size:12px;">${escaparHTML(r.zona || '-')}</span></td>
            <td><b style="color:#005A9C;">${r.numeroActuaciones || 1}</b></td>
        `;
        tr.onclick = () => seleccionarFila(parseInt(tr.dataset.index),tr);
        body.appendChild(tr);
    });

    document.getElementById('contador').innerText = `Total registros: ${registros.length}`;
}

function seleccionarFila(index,tr){
    document.querySelectorAll('tbody tr').forEach(f => f.style.background='');
    tr.style.background='#e0f2fe';
    filaSeleccionada = index;
}

function eliminarSeleccionado(){
    if(filaSeleccionada === null){
        alert('Selecciona un registro de la tabla');
        return;
    }
    registros.splice(filaSeleccionada,1);
    filaSeleccionada = null;
    guardarDatos();
    renderTabla();
    actualizarSugerencias();
}

function ordenarPorFecha(){
    registros.sort((a, b) => {
        const fechaA = a.fecha.includes(' a ') ? a.fecha.split(' a ')[0] : a.fecha;
        const fechaB = b.fecha.includes(' a ') ? b.fecha.split(' a ')[0] : b.fecha;
        return new Date(fechaA) - new Date(fechaB);
    });
    guardarDatos();
    renderTabla();
}

function guardarDatos(descargar = false){
    localStorage.setItem('registros',JSON.stringify(registros));
    if(descargar){
        const datos = JSON.stringify(registros, null, 2);
        const blob = new Blob([datos], { type:'application/json' });
        const enlace = document.createElement('a');
        enlace.href = URL.createObjectURL(blob);
        enlace.download = 'registro.json';
        document.body.appendChild(enlace);
        enlace.click();
        document.body.removeChild(enlace);
        URL.revokeObjectURL(enlace.href);
    }
}

function restaurarCopia(event){
    const archivo = event.target.files[0];
    if(!archivo) return;

    const lector = new FileReader();
    lector.onload = function(e){
        try{
            const datos = JSON.parse(e.target.result);
            if(!Array.isArray(datos)){
                alert('El archivo no es válido');
                return;
            }
            registros = datos;
            localStorage.setItem('registros', JSON.stringify(registros));
            renderTabla();
            actualizarSugerencias();
            inicializarActuacionesFijas();
            alert('Copia restaurada correctamente');
        }catch(error){
            alert('Error al restaurar la copia');
        }
    };
    lector.readAsText(archivo);
    event.target.value = '';
}

function limpiarCampos(){
    document.getElementById('actuacion').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('zona').value = '';
    document.getElementById('numeroActuaciones').value = '1';
}

document.getElementById('busqueda').addEventListener('keyup', function(){
    const texto = this.value.toLowerCase();
    document.querySelectorAll('#tablaBody tr').forEach(tr => {
        tr.style.display = tr.innerText.toLowerCase().includes(texto) ? '' : 'none';
    });
});

function actualizarSugerencias(){
    actualizarLista('descripcion','listaDescripcion');
    actualizarLista('zona','listaZona');
    inicializarActuacionesFijas();
}

function actualizarLista(campo, listaId){
    const lista = document.getElementById(listaId);
    const frecuencia = {};
    registros.forEach(r => {
        const valor = (r[campo] || '').trim();
        if(valor !== '') frecuencia[valor] = (frecuencia[valor] || 0) + 1;
    });

    const ordenados = Object.entries(frecuencia)
    .sort((a,b) => b[1] - a[1])
    .map(e => e[0]);

    lista.innerHTML = '';
    ordenados.forEach(valor => {
        const option = document.createElement('option');
        option.value = valor;
        lista.appendChild(option);
    });
}

function filtrarUltimoDia() {
    if (registros.length === 0) return;
    const fechasLimpias = registros.map(r => r.fecha.includes(' a ') ? r.fecha.split(' a ')[0] : r.fecha);
    const ordenadas = fechasLimpias.filter(Boolean).sort((a, b) => new Date(b) - new Date(a));
    if(ordenadas.length === 0) return;
    
    const ultimaFecha = ordenadas[0];
    const filas = document.querySelectorAll("tbody tr");

    filas.forEach((fila, i) => {
        const fechaRegistro = registros[i].fecha.includes(' a ') ? registros[i].fecha.split(' a ')[0] : registros[i].fecha;
        fila.style.display = (fechaRegistro === ultimaFecha) ? "" : "none";
    });
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script>
let datosUsuario = JSON.parse(localStorage.getItem('datosUsuario')) || { nombre:'', puesto:'', lugar:'' };

document.getElementById('btnPerfil').addEventListener('click', function(e){
    e.preventDefault();
    mostrarModalUsuario();
});

function mostrarModalUsuario(){
    const modalExistente = document.getElementById('modalUsuario');
    if(modalExistente) modalExistente.remove();

    const modal = document.createElement('div');
    modal.id = 'modalUsuario';
    modal.innerHTML = `
        <div style="position:fixed; inset:0; background:rgba(15,23,42,0.3); display:flex; align-items:center; justify-content:center; z-index:99999; backdrop-filter:blur(4px);">
            <div style="width:380px; background:#ffffff; border-radius:24px; padding:30px; border:1px solid #cbd5e1; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);">
                <div style="text-align:center; margin-bottom:25px;">
                    <div style="width:70px; height:70px; border-radius:50%; background:#005A9C; display:flex; align-items:center; justify-content:center; margin:auto; margin-bottom:15px;">
                        <i class="fa-solid fa-user" style="color:white; font-size:28px;"></i>
                    </div>
                    <div style="color:#0f172a; font-size:24px; font-weight:700;">Perfil profesional</div>
                    <div style="color:#64748b; font-size:13px; margin-top:6px;">Configura los datos del usuario</div>
                </div>
                <input id="inputNombreUsuario" type="text" placeholder="Nombre y apellidos" value="${datosUsuario.nombre || ''}" style="width:100%; background:#f8fafc; border:1px solid #cbd5e1; color:#1e293b; padding:14px; border-radius:14px; margin-bottom:14px; outline:none; font-size:14px;">
                <input id="inputPuestoUsuario" type="text" placeholder="Puesto de trabajo" value="${datosUsuario.puesto || ''}" style="width:100%; background:#f8fafc; border:1px solid #cbd5e1; color:#1e293b; padding:14px; border-radius:14px; margin-bottom:14px; outline:none; font-size:14px;">
                <input id="inputLugarUsuario" type="text" placeholder="Lugar de trabajo" value="${datosUsuario.lugar || ''}" style="width:100%; background:#f8fafc; border:1px solid #cbd5e1; color:#1e293b; padding:14px; border-radius:14px; margin-bottom:20px; outline:none; font-size:14px;">
                <button id="guardarPerfilUsuario" style="width:100%; border:none; background:#005A9C; color:white; padding:14px; border-radius:16px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:10px;">
                    <i class="fa-solid fa-floppy-disk" style="margin-right:4px;"></i> Guardar datos
                </button>
                <button id="cerrarPerfilUsuario" style="width:100%; border:none; background:transparent; color:#64748b; padding:12px; cursor:pointer; font-size:13px;">Cancelar</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('guardarPerfilUsuario').onclick = () => {
        datosUsuario = {
            nombre: document.getElementById('inputNombreUsuario').value.trim(),
            puesto: document.getElementById('inputPuestoUsuario').value.trim(),
            lugar: document.getElementById('inputLugarUsuario').value.trim()
        };
        localStorage.setItem('datosUsuario', JSON.stringify(datosUsuario));
        modal.remove();
    };
    document.getElementById('cerrarPerfilUsuario').onclick = () => modal.remove();
}

function generarResumenActuaciones(){
    const resumen = {};
    registros.forEach(r => {
        const clave = `${escaparHTML(r.actuacion)}|||${r.factor}`;
        const cantidad = parseInt(r.numeroActuaciones || 1);
        if(!resumen[clave]){
            resumen[clave] = { actuacion: r.actuacion, factor: r.factor, total: 0 };
        }
        resumen[clave].total += cantidad;
    });
    return Object.values(resumen);
}

function exportarPDF(){
    if(registros.length === 0){
        alert('No hay registros para exportar');
        return;
    }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l', 'mm', 'a4');

    doc.setFillColor(255,255,255);
    doc.rect(0,0,297,210,'F');
    doc.setFillColor(0,90,156);
    doc.roundedRect(12,12,85,42,5,5,'F');

    doc.setTextColor(255,255,255);
    doc.setFontSize(15);
    doc.text('DATOS DEL USUARIO', 54, 22, { align:'center' });
    doc.setFontSize(11);
    doc.text(`Nombre: ${datosUsuario.nombre || '-'}`, 54, 32, { align:'center' });
    doc.text(`Puesto: ${datosUsuario.puesto || '-'}`, 54, 40, { align:'center' });
    doc.text(`Lugar: ${datosUsuario.lugar || '-'}`, 54, 48, { align:'center' });

    doc.setTextColor(0,0,0);
    doc.setFontSize(24);
    doc.text('REGISTRO DE ACTUACIONES', 190, 28, { align:'center' });
    doc.setFontSize(11);
    doc.text(`Fecha exportación: ${new Date().toLocaleDateString('es-ES')}`, 190, 40, { align:'center' });
    doc.text(`Total registros: ${registros.length}`, 190, 48, { align:'center' });

    const filas = registros.map(r => [formatearFecha(r.fecha), r.actuacion, r.factor, r.descripcion, r.zona, r.numeroActuaciones || 1]);
    doc.autoTable({
        head:[['Fecha', 'Actuación', 'Factor', 'Descripción', 'Zona', 'Nº Actuaciones']],
        body:filas, startY:65, theme:'grid',
        styles:{ fontSize:8, cellPadding:3, halign:'center', valign:'middle' },
        headStyles:{ fillColor:[0,90,156], textColor:[255,255,255], halign:'center', fontStyle:'bold' },
        bodyStyles:{ textColor:[0,0,0] },
        alternateRowStyles:{ fillColor:[245,247,250] },
        margin:{ left:10, right:10 }
    });

    const resumen = generarResumenActuaciones();
    const filasResumen = resumen.map(r => [r.actuacion, r.factor, r.total]);
    doc.addPage();
    doc.setFontSize(20);
    doc.text('RESUMEN DE ACTUACIONES', 148, 20, { align:'center' });
    doc.autoTable({
        head:[['Actuación', 'Factor', 'Total actuaciones']],
        body:filasResumen, startY:35, theme:'grid',
        styles:{ fontSize:10, cellPadding:4, halign:'center', valign:'middle' },
        headStyles:{ fillColor:[0,90,156], textColor:[255,255,255], fontStyle:'bold' },
        alternateRowStyles:{ fillColor:[245,247,250] },
        margin:{ left:15, right:15 }
    });
    doc.save('registro_actuaciones.pdf');
}
</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
function mostrarModalExportacion(){
    const modalExistente = document.getElementById('modalExportacion');
    if(modalExistente) modalExistente.remove();

    const modal = document.createElement('div');
    modal.id = 'modalExportacion';
    modal.innerHTML = `
        <div style="position:fixed; inset:0; background:rgba(15,23,42,0.3); display:flex; align-items:center; justify-content:center; z-index:99999; backdrop-filter:blur(4px);">
            <div style="width:340px; background:#ffffff; border-radius:24px; padding:28px; border:1px solid #cbd5e1; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);">
                <div style="text-align:center; margin-bottom:24px;">
                    <i class="fa-solid fa-file-export" style="font-size:42px; color:#005A9C; margin-bottom:14px;"></i>
                    <div style="font-size:22px; font-weight:700; color:#0f172a;">Exportar registros</div>
                    <div style="font-size:13px; color:#64748b; margin-top:8px;">Selecciona el formato de exportación</div>
                </div>
                <button id="btnPDFExport" style="width:100%; border:none; background:#ef4444; color:white; padding:14px; border-radius:16px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:14px;">
                    <i class="fa-solid fa-file-pdf"></i> Exportar en PDF
                </button>
                <button id="btnExcelExport" style="width:100%; border:none; background:#22c55e; color:white; padding:14px; border-radius:16px; font-size:15px; font-weight:600; cursor:pointer;">
                    <i class="fa-solid fa-file-excel"></i> Exportar en Excel
                </button>
                <button id="cerrarModalExport" style="width:100%; border:none; background:transparent; color:#64748b; padding:12px; margin-top:12px; cursor:pointer; font-size:13px;">Cancelar</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('btnPDFExport').onclick = () => { exportarPDF(); modal.remove(); };
    document.getElementById('btnExcelExport').onclick = () => { exportarExcel(); modal.remove(); };
    document.getElementById('cerrarModalExport').onclick = () => modal.remove();
}

function exportarExcel(){
    if(registros.length === 0){
        alert('No hay registros para exportar');
        return;
    }
    const datos = registros.map(r => ({
        Fecha: formatearFecha(r.fecha), Actuación: r.actuacion, Factor: r.factor,
        Descripción: r.descripcion, Zona: r.zona, 'Nº Actuaciones': r.numeroActuaciones || 1
    }));

    const wsRegistros = XLSX.utils.json_to_sheet(datos);
    const columnasRegistros = Object.keys(datos[0]);
    wsRegistros['!cols'] = columnasRegistros.map(col => ({ wch: Math.max(col.length, ...datos.map(r => String(r[col] || '').length)) + 6 }));

    const wsResumen = XLSX.utils.json_to_sheet(generarResumenActuaciones().map(r => ({ Actuación: r.actuacion, Factor: r.factor, 'Total actuaciones': r.total })));

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsRegistros, 'Registros');
    XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');
    XLSX.writeFile(wb, 'registro_actuaciones.xlsx');
}
</script>

<script>
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

document.getElementById('btnRecargar').addEventListener('click', function(e){
    e.preventDefault();
    location.reload();
});

const btnMenuExtra = document.getElementById('btnMenuExtra');
const dropdownMenu = document.getElementById('dropdownMenu');

btnMenuExtra.addEventListener('click', function(e){
    e.preventDefault();
    dropdownMenu.classList.toggle('show');
});

document.addEventListener('click', function(e){
    if(!btnMenuExtra.contains(e.target) && !dropdownMenu.contains(e.target)){
        dropdownMenu.classList.remove('show');
    }
});

document.getElementById('btnExportarMenu').addEventListener('click', function(e){
    e.preventDefault();
    dropdownMenu.classList.remove('show');
    mostrarModalExportacion();
});

document.getElementById('btnInstalarMenu').addEventListener('click', async function(e){
    e.preventDefault();
    dropdownMenu.classList.remove('show');
    if(deferredPrompt){
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if(result.outcome === 'accepted'){
            alert('Aplicación instalada correctamente');
        }else{
            alert('Instalación cancelada');
        }
        deferredPrompt = null;
    }else{
        alert('Chrome → menú ⋮ → Añadir a pantalla de inicio');
    }
});

document.getElementById('btnSalirApp').addEventListener('click', function(e){
    e.preventDefault();
    dropdownMenu.classList.remove('show');
    mostrarModalSalir();
});

function mostrarModalSalir(){
    const modalExistente = document.getElementById('modalSalirApp');
    if(modalExistente) modalExistente.remove();

    const modal = document.createElement('div');
    modal.id = 'modalSalirApp';
    modal.innerHTML = `
        <div style="position:fixed; inset:0; background:rgba(15,23,42,0.3); display:flex; align-items:center; justify-content:center; z-index:99999; backdrop-filter:blur(4px);">
            <div style="width:380px; background:#ffffff; border-radius:24px; padding:30px; border:1px solid #cbd5e1; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);">
                <div style="text-align:center;margin-bottom:25px;">
                    <div style="width:70px; height:70px; border-radius:50%; background:#005A9C; display:flex; align-items:center; justify-content:center; margin:auto; margin-bottom:15px;">
                        <i class="fa-solid fa-arrow-right-from-bracket" style="color:white; font-size:28px;"></i>
                    </div>
                    <div style="color:#0f172a; font-size:24px; font-weight:700;">Salir de la aplicación</div>
                    <div style="color:#64748b; font-size:13px; margin-top:6px;">¿Deseas cerrar la aplicación?</div>
                </div>
                <button id="confirmarSalirApp" style="width:100%; border:none; background:#005A9C; color:white; padding:14px; border-radius:16px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:10px;">
                    <i class="fa-solid fa-person-walking-arrow-right" style="margin-right:4px; font-size:18px;"></i> Salir ahora
                </button>
                <button id="cancelarSalirApp" style="width:100%; border:none; background:transparent; color:#64748b; padding:12px; cursor:pointer; font-size:13px;">Cancelar</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('confirmarSalirApp').onclick = () => { window.close(); window.location.href = 'about:blank'; };
    document.getElementById('cancelarSalirApp').onclick = () => modal.remove();
}

document.getElementById('btnEliminarTodoMenu').addEventListener('click', function(e){
    e.preventDefault();
    mostrarModalEliminarTodo();
});

function mostrarModalEliminarTodo(){
    const modalExistente = document.getElementById('modalEliminarTodo');
    if(modalExistente) modalExistente.remove();

    const modal = document.createElement('div');
    modal.id = 'modalEliminarTodo';
    modal.innerHTML = `
        <div style="position:fixed; inset:0; background:rgba(15,23,42,0.3); display:flex; align-items:center; justify-content:center; z-index:99999; backdrop-filter:blur(4px);">
            <div style="width:380px; background:#ffffff; border-radius:24px; padding:30px; border:1px solid #cbd5e1; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);">
                <div style="text-align:center;margin-bottom:25px;">
                    <div style="width:70px; height:70px; border-radius:50%; background:#005A9C; display:flex; align-items:center; justify-content:center; margin:auto; margin-bottom:15px;">
                        <i class="fa-solid fa-trash" style="color:white; font-size:28px;"></i>
                    </div>
                    <div style="color:#0f172a; font-size:24px; font-weight:700;">Eliminar registros</div>
                    <div style="color:#64748b; font-size:13px; margin-top:6px;">Se eliminarán todos los registros guardados</div>
                </div>
                <button id="confirmarEliminarTodo" style="width:100%; border:none; background:#005A9C; color:white; padding:14px; border-radius:16px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:10px;">
                    <i class="fa-solid fa-trash" style="margin-right:4px;"></i> Eliminar todo
                </button>
                <button id="cancelarEliminarTodo" style="width:100%; border:none; background:transparent; color:#64748b; padding:12px; cursor:pointer; font-size:13px;">Cancelar</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('confirmarEliminarTodo').onclick = () => {
        registros = [];
        localStorage.removeItem('registros');
        filaSeleccionada = null;
        renderTabla();
        actualizarSugerencias();
        dropdownMenu.classList.remove('show');
        modal.remove();
    };
    document.getElementById('cancelarEliminarTodo').onclick = () => modal.remove();
}
</script>

<script>
function actualizarFechaHora(){
    const ahora = new Date();
    const fecha = ahora.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric'});
    const hora = ahora.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('fechaHoraActual').innerHTML=`${fecha} · ${hora}`;
}
actualizarFechaHora();
setInterval(actualizarFechaHora,30000);
</script>

<script>
document.querySelectorAll('.fecha-card').forEach(card => {
    const input = card.querySelector('input[type="date"]');
    if(input) {
        card.addEventListener('click', () => {
            if(input.showPicker){
                input.showPicker();
            }else{
                input.focus();
            }
        });
    }
});
</script>
