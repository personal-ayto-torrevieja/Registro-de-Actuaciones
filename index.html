<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Actuaciones</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#121826;
    color:white;
    width:100%;
    min-height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    width:100%;
    height:100vh;
    gap:14px;
    padding:14px;
    overflow:hidden;
}

.sidebar{
    width:320px;
    min-width:280px;
    background:#1e293b;
    border-radius:18px;
    padding:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    overflow:auto;
}

.content{
    flex:1;
    min-width:0;
    background:#1e293b;
    border-radius:18px;
    padding:16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.title{
    font-size:26px;
    font-weight:700;
    margin-bottom:20px;
}

.label{
    display:block;
    margin-bottom:6px;
    margin-top:12px;
    font-size:13px;
    font-weight:600;
}

.input,
input[type="date"],
.select{
    width:100%;
    background:#334155;
    border:none;
    color:white;
    padding:11px;
    border-radius:10px;
    outline:none;
    font-size:13px;
}

.input:focus,
input[type="date"]:focus,
.select:focus{
    border:2px solid #4472c4;
}

.buttons{
    margin-top:18px;
    display:grid;
    gap:10px;
}

.btn{
    border:1px solid #dcdcdc;
    padding:8px 10px;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    transition:.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 16px 10px rgba(0,0,0,.20);
}

.btn i{
    font-size:20px;
}

.btn:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
}

.add{background:#22c55e;}
.delete{background:#ef4444;}
.pdf{background:#f59e0b;}
.save{background:#06b6d4;}
.restore{background:#8f93a1;}

.search{
    width:100%;
    background:#334155;
    border:none;
    color:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:14px;
    outline:none;
}

.table-container{
    width:100%;
    overflow:auto;
    border-radius:14px;
    flex:1;
}

table{
    min-width:900px;
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#4472c4;
    position:sticky;
    top:0;
}

th{
    padding:12px;
    text-align:center;
    vertical-align:middle;
    font-size:13px;
}

tbody tr{
    background:#243041;
    transition:.2s;
}

tbody tr:nth-child(even){
    background:#2b3748;
}

tbody tr:hover{
    background:#4472c4;
    cursor:pointer;
}

td{
    padding:10px;
    text-align:center;
    vertical-align:middle;
    font-size:13px;
    word-break:break-word;
}

.footer{
    margin-top:10px;
    color:#c7d2fe;
    font-size:13px;
}

.stats{
    margin-top:5px;
    color:#94a3b8;
}

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-thumb{
    background:#4472c4;
    border-radius:10px;
}

input[type="date"]::-webkit-calendar-picker-indicator{
    filter:invert(1) brightness(1.6);
    cursor:pointer;
    opacity:1;
    transform:scale(1.3);
}

@media (max-width: 1024px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        min-width:100%;
    }

    .content{
        width:100%;
        min-height:500px;
    }
}

@media (max-width: 640px){

    .buttons{
        grid-template-columns:1fr;
    }

    .btn{
        font-size:12px;
        padding:9px;
    }

    .btn i{
        font-size:14px;
    }

    table{
        min-width:700px;
    }
}


.fecha-input{
    appearance:none;
    -webkit-appearance:none;
    position:relative;
}

.fecha-input::-webkit-calendar-picker-indicator{
    opacity:0 !important;
    position:absolute;
    right:0;
    width:100%;
    height:100%;
    cursor:pointer;
}

.fecha-input::-webkit-inner-spin-button,
.fecha-input::-webkit-clear-button{
    display:none !important;
}


.fecha-input{
    text-align:left !important;
}

</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div style="display:flex;justify-content:center;margin-bottom:25px;">
            <img src="logo.png" alt="Logo" style="width:290px;max-width:100%;filter:brightness(0) invert(1);opacity:.95;">
        </div>
        <label class="label">Fecha</label>
        
<div style="position:relative;">
    <i class="fa-solid fa-calendar-days"
       style="position:absolute;
       left:14px;
       top:50%;
       transform:translateY(-50%);
       color:#60a5fa;
       font-size:18px;
       pointer-events:none;
       z-index:2;"></i>

    <input type="date"
           class="input fecha-input"
           id="fecha"
           style="padding-left:45px;
           padding-right:50px;
           height:42px;
           font-size:16px;">

    <i class="fa-solid fa-angle-down"
       style="position:absolute;
       right:18px;
       top:50%;
       transform:translateY(-50%);
       font-size:20px;
       color:#60a5fa;
       pointer-events:none;"></i>
</div>


        <label class="label">Actuación</label>
        <input type="text" class="input" id="actuacion">

        <label class="label">Descripción</label>
        <input type="text" class="input" id="descripcion">

        <label class="label">Aula/Zona</label>
        <input type="text" class="input" id="zona">

        <label class="label">Observaciones</label>
        <input type="text" class="input" id="observaciones">

        <label class="label">Factor</label>
        <div style="position:relative;">
            <select class="select" id="factor" style="appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-right:50px;height:42px;cursor:pointer;">
            <option>1.1: Actividad Extraordinaria</option>
            <option>1.2: Funciones Adicionales</option>
            <option>1.3: Iniciativa y Mejora grupal</option>
            <option>1.4: Especial Atn. al Servicio</option>
            <option>Plan de Actuación Pendiente</option>
        </select>
        <i class="fa-solid fa-angle-down" style="position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:22px;color:#60a5fa;pointer-events:none;"></i>
        </div>

        <!--
            -->

        <div class="buttons">
            <button class="btn add" onclick="agregarRegistro()">
                <i class="fa-solid fa-circle-plus"></i>
                Añadir Registro
            </button>

            <button class="btn delete" onclick="eliminarSeleccionado()">
                <i class="fa-regular fa-trash-can"></i>
                Eliminar Registro
            </button>

            <button class="btn pdf" onclick="exportarPDF()">
                <i class="fa-regular fa-file-pdf"></i>
                Exportar Tabla a PDF
            </button>

            <button class="btn save" onclick="guardarDatos(true)">
                <i class="fa-solid fa-cloud-arrow-down"></i>
                Descargar Copia de Seguridad
            </button>

            <button class="btn restore" onclick="document.getElementById('inputRestaurar').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                Restaurar Copia de Seguridad
            </button>

            <input
                type="file"
                id="inputRestaurar"
                accept=".json"
                style="display:none"
                onchange="restaurarCopia(event)"
            >
        </div>
	</div>

    <div class="content">

        <input type="text" class="search" placeholder="Buscar registros..." id="busqueda">

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width:90px">Fecha</th>
                        <th style="width:240px">Actuación</th>
                        <th style="width:240px">Factor</th>
                        <th style="width:300px">Descripción</th>
                        <th style="width:100px">Aula/Zona</th>
                        <th style="width:140px">Observaciones</th>
                    </tr>
                </thead>

                <tbody id="tablaBody"></tbody>
            </table>
        </div>

        <div class="footer">
            <div id="contador">
                Total registros: 0
            </div>

            <div class="stats">
                Sistema listo
            </div>
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>
let registros = JSON.parse(localStorage.getItem('registros')) || [];
let filaSeleccionada = null;

renderTabla();

function agregarRegistro(){

    const fecha = document.getElementById('fecha').value;
    const actuacion = document.getElementById('actuacion').value;
    const descripcion = document.getElementById('descripcion').value;
    const zona = document.getElementById('zona').value;
    const observaciones = document.getElementById('observaciones').value;
    const factor = document.getElementById('factor').value;

    if(!actuacion){
        alert('Debes introducir una actuación');
        return;
    }

    registros.push({
        fecha,
        actuacion,
        factor,
        descripcion,
        zona,
        observaciones
    });

    guardarDatos();
    renderTabla();
    limpiarCampos();
}

function renderTabla(){

    const body = document.getElementById('tablaBody');
    body.innerHTML = '';

    registros.forEach((r,index) => {

        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${r.fecha}</td>
            <td>${r.actuacion}</td>
            <td>${r.factor}</td>
            <td>${r.descripcion}</td>
            <td>${r.zona}</td>
            <td>${r.observaciones}</td>
        `;

        tr.onclick = () => seleccionarFila(index,tr);

        body.appendChild(tr);
    });

    document.getElementById('contador').innerText =
        `Total registros: ${registros.length}`;
}

function seleccionarFila(index,tr){

    document.querySelectorAll('tbody tr').forEach(f => {
        f.style.background='';
    });

    tr.style.background='#4472c4';
    filaSeleccionada = index;
}

function eliminarSeleccionado(){

    if(filaSeleccionada === null){
        alert('Selecciona un registro');
        return;
    }

    registros.splice(filaSeleccionada,1);
    filaSeleccionada = null;

    guardarDatos();
    renderTabla();
}

function guardarDatos(descargar = false){

    localStorage.setItem('registros',JSON.stringify(registros));

    if(descargar){

        const datos = JSON.stringify(registros, null, 2);
        const blob = new Blob([datos], { type:'application/json' });

        const enlace = document.createElement('a');
        enlace.href = URL.createObjectURL(blob);
        enlace.download = 'registro.json';

        document.body.appendChild(enlace);
        enlace.click();

        document.body.removeChild(enlace);
        URL.revokeObjectURL(enlace.href);
    }
}


function restaurarCopia(event){

    const archivo = event.target.files[0];

    if(!archivo){
        return;
    }

    const lector = new FileReader();

    lector.onload = function(e){

        try{

            const datos = JSON.parse(e.target.result);

            if(!Array.isArray(datos)){
                alert('El archivo no es válido');
                return;
            }

            registros = datos;

            localStorage.setItem(
                'registros',
                JSON.stringify(registros)
            );

            renderTabla();

            alert('Copia de seguridad restaurada correctamente');

        }catch(error){
            alert('Error al restaurar la copia');
        }
    };

    lector.readAsText(archivo);

    event.target.value = '';
}

function exportarPDF(){

    if(registros.length === 0){
        alert('No hay registros para exportar');
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('landscape');

    const filas = registros.map(r => [
        r.fecha,
        r.actuacion,
        r.factor,
        r.descripcion,
        r.zona,
        r.observaciones
    ]);

    doc.autoTable({
        head:[["Fecha","Actuación","Factor","Descripción","Aula/Zona","Observaciones"]],
        body:filas,
        styles:{
            fontSize:8,
            halign:'center',
            valign:'middle'
        },
        headStyles:{
            fillColor:[68,114,196]
        }
    });

    doc.save('registro_actuaciones.pdf');
}

function limpiarCampos(){
    document.getElementById('actuacion').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('zona').value = '';
    document.getElementById('observaciones').value = '';
}

document.getElementById('busqueda').addEventListener('keyup', function(){

    const texto = this.value.toLowerCase();

    document.querySelectorAll('#tablaBody tr').forEach(tr => {

        const contenido = tr.innerText.toLowerCase();

        tr.style.display = contenido.includes(texto)
            ? ''
            : 'none';
    });
});
</script>

</body>
</html>
