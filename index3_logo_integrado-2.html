<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Actuaciones</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#121826;
    color:white;
    width:100%;
    min-height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    width:100%;
    height:100vh;
    gap:14px;
    padding:14px;
    overflow:hidden;
}

.sidebar{
    width:320px;
    min-width:280px;
    background:#1e293b;
    border-radius:18px;
    padding:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    overflow:auto;
}

.content{
    flex:1;
    min-width:0;
    background:#1e293b;
    border-radius:18px;
    padding:16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.title{
    font-size:26px;
    font-weight:700;
    margin-bottom:20px;
}

.label{
    display:block;
    margin-bottom:6px;
    margin-top:12px;
    font-size:13px;
    font-weight:600;
}

.input,
input[type="date"],
.select{
    width:100%;
    background:#334155;
    border:none;
    color:white;
    padding:11px;
    border-radius:10px;
    outline:none;
    font-size:13px;
}

.input:focus,
input[type="date"]:focus,
.select:focus{
    border:2px solid #4472c4;
}


.buttons{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.btn-row{
    display:flex;
    gap:12px;
    width:100%;
}

.btn-row .btn{
    flex:1;
}

.full{
    width:100%;
}


.btn{
    border:1px solid #dcdcdc;
    padding:10px 10px;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    transition:.1s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 16px 10px rgba(0,0,0,.20);
}

.btn i{
    font-size:20px;
}

.btn:hover{
    transform:translateY(-2px);
    filter:brightness(1.05);
}

.add{background:#22c55e;}
.delete{background:#ef4444;}
.pdf{background:#f59e0b;}
.save{background:#06b6d4;}
.restore{background:#8f93a1;}

.search{
    width:100%;
    background:#334155;
    border:none;
    color:white;
    padding:12px;
    border-radius:12px;
    margin-bottom:14px;
    outline:none;
}

.table-container{
    width:100%;
    overflow:auto;
    border-radius:14px;
    flex:1;
}

table{
    min-width:900px;
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#4472c4;
    position:sticky;
    top:0;
}

th{
    padding:12px;
    text-align:center;
    vertical-align:middle;
    font-size:13px;
}

tbody tr{
    background:#243041;
    transition:.2s;
}

tbody tr:nth-child(even){
    background:#2b3748;
}

tbody tr:hover{
    background:#4472c4;
    cursor:pointer;
}

td{
    padding:10px;
    text-align:center;
    vertical-align:middle;
    font-size:13px;
    word-break:break-word;
}

.footer{
    margin-top:10px;
    color:#c7d2fe;
    font-size:13px;
}

.stats{
    margin-top:5px;
    color:#94a3b8;
}

::-webkit-scrollbar{
    width:8px;
    height:8px;
}

::-webkit-scrollbar-thumb{
    background:#4472c4;
    border-radius:10px;
}

input[type="date"]::-webkit-calendar-picker-indicator{
    filter:invert(1) brightness(1.6);
    cursor:pointer;
    opacity:1;
    transform:scale(1.3);
}

.fecha-input{
    appearance:none;
    -webkit-appearance:none;
    position:relative;
}

.fecha-input::-webkit-calendar-picker-indicator{
    opacity:0 !important;
    position:absolute;
    right:0;
    width:100%;
    height:100%;
    cursor:pointer;
}

@media (max-width: 1024px){

    body{
        overflow:auto;
    }

    .container{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        min-width:100%;
    }

    .content{
        width:100%;
        min-height:500px;
    }
}

@media (max-width: 640px){

    .buttons{
        grid-template-columns:1fr;
    }

    .btn{
        font-size:12px;
        padding:9px;
    }

    .btn i{
        font-size:14px;
    }

    table{
        min-width:700px;
    }
}


/* CONTORNOS GENERALES */
.sidebar,
.content{
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        0 0 0 1px rgba(255,255,255,.03),
        0 12px 30px rgba(0,0,0,.45);
}

/* INPUTS Y SELECT */
.input,
input[type="date"],
.select,
.search{
    width:100%;
    background:#334155;
    color:white;
    padding:11px;
    border-radius:18px;
    outline:none;
    font-size:13px;

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 4px 10px rgba(0,0,0,.25);

    appearance:none;
    -webkit-appearance:none;
}

.fecha-input{
    background:#334155 !important;
    border-radius:18px !important;
    border:1px solid rgba(255,255,255,.08) !important;
}

    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.03),
        0 4px 10px rgba(0,0,0,.25);
}

/* EFECTO AL ENFOCAR */
.input:focus,
input[type="date"]:focus,
.select:focus,
.search:focus{
    border:1px solid #4472c4;
    box-shadow:
        0 0 0 3px rgba(68,114,196,.18),
        0 4px 12px rgba(0,0,0,.35);
}

/* BOTONES */
.btn{
    border:1px solid rgba(255,255,255,.12);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 10px 18px rgba(0,0,0,.35);
}

/* TABLA */
.table-container{
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.02),
        0 10px 24px rgba(0,0,0,.30);
}

/* FILAS */
tbody tr{
    border-bottom:1px solid rgba(255,255,255,.04);
}

/* BLOQUES MÁS REDONDOS */
.sidebar,
.content,
.input,
.select,
.search,
.table-container,
.btn{
    border-radius:18px;
}


/* CONTENEDOR DEL LOGO */
.logo-box{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:25px;
    padding:18px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);

    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 10px 24px rgba(0,0,0,.35);
}

.logo-box img{
    width:290px;
    max-width:100%;
    opacity:.95;

    filter:
        brightness(0) invert(1)
        drop-shadow(0 0 8px rgba(255,255,255,.08));
}

</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>


<script>

let registros = JSON.parse(localStorage.getItem('registros')) || [];
let filaSeleccionada = null;

const actuacionesPorFactor = {

    '1.1: Actividad Extraordinaria': [
        'Gestión sanitaria básica',
        'Supervisión del alumnado',
        'Comunicación con familias',
        'Gestión de objetos perdidos',
        'Recepción y entrega de materiales personales'
    ],

    '1.2: Funciones Adicionales': [
        'Organización de eventos',
        'Adecuación de aulas',
        'Instalación de equipamiento',
        'Apoyo administrativo',
        'Control de sistemas',
        'Apoyo en limpieza',
        'Primeros auxilios',
        'Gestión de residuos',
        'Control de suministros'
    ],

    '1.3: Iniciativa y Mejora grupal': [
        'Participación en reuniones y coordinación interna',
        'Propuestas de mejora del servicio de conserjería',
        'Gestión de incidencias del profesorado',
        'Coordinación con dirección y personal municipal',
        'Mejora en la gestión de llaves y accesos'
    ]
};

renderTabla();
actualizarSugerencias();
inicializarActuacionesFijas();

function inicializarActuacionesFijas(){

    const lista = document.getElementById('listaActuacion');

    const actuacionesUnicas = [
        ...new Set([
            ...Object.values(actuacionesPorFactor).flat(),
            ...registros.map(r => r.actuacion).filter(Boolean)
        ])
    ];

    lista.innerHTML = '';

    actuacionesUnicas.forEach(actuacion => {

        const option = document.createElement('option');

        option.value = actuacion;

        lista.appendChild(option);
    });
}

function detectarFactorAutomatico(){

    const actuacion = document
    .getElementById('actuacion')
    .value
    .trim();

    const selectFactor = document.getElementById('factor');

    for(const factor in actuacionesPorFactor){

        if(actuacionesPorFactor[factor].includes(actuacion)){

            selectFactor.value = factor;
            return;
        }
    }
}

document
.getElementById('actuacion')
.addEventListener('input', detectarFactorAutomatico);

function agregarRegistro(){

    const fecha = document.getElementById('fecha').value;
    const actuacion = document.getElementById('actuacion').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const zona = document.getElementById('zona').value.trim();
    const observaciones = document.getElementById('observaciones').value.trim();
    const factor = document.getElementById('factor').value;

    if(!actuacion){
        alert('Debes introducir una actuación');
        return;
    }

    registros.push({
        fecha,
        actuacion,
        factor,
        descripcion,
        zona,
        observaciones
    });

    guardarDatos();
    renderTabla();
    actualizarSugerencias();
    limpiarCampos();
}

function renderTabla(){

    const body = document.getElementById('tablaBody');
    body.innerHTML = '';

    registros.forEach((r,index) => {

        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${r.fecha}</td>
            <td>${r.actuacion}</td>
            <td>${r.factor}</td>
            <td>${r.descripcion}</td>
            <td>${r.zona}</td>
            <td>${r.observaciones}</td>
        `;

        tr.onclick = () => seleccionarFila(index,tr);

        body.appendChild(tr);
    });

    document.getElementById('contador').innerText =
    `Total registros: ${registros.length}`;
}

function seleccionarFila(index,tr){

    document.querySelectorAll('tbody tr').forEach(f => {
        f.style.background='';
    });

    tr.style.background='#4472c4';

    filaSeleccionada = index;
}

function eliminarSeleccionado(){

    if(filaSeleccionada === null){
        alert('Selecciona un registro');
        return;
    }

    registros.splice(filaSeleccionada,1);

    filaSeleccionada = null;

    guardarDatos();
    renderTabla();
    actualizarSugerencias();
}

function guardarDatos(descargar = false){

    localStorage.setItem('registros',JSON.stringify(registros));

    if(descargar){

        const datos = JSON.stringify(registros, null, 2);

        const blob = new Blob([datos], {
            type:'application/json'
        });

        const enlace = document.createElement('a');

        enlace.href = URL.createObjectURL(blob);
        enlace.download = 'registro.json';

        document.body.appendChild(enlace);

        enlace.click();

        document.body.removeChild(enlace);

        URL.revokeObjectURL(enlace.href);
    }
}

function restaurarCopia(event){

    const archivo = event.target.files[0];

    if(!archivo){
        return;
    }

    const lector = new FileReader();

    lector.onload = function(e){

        try{

            const datos = JSON.parse(e.target.result);

            if(!Array.isArray(datos)){
                alert('El archivo no es válido');
                return;
            }

            registros = datos;

            localStorage.setItem(
                'registros',
                JSON.stringify(registros)
            );

            renderTabla();
            actualizarSugerencias();
            inicializarActuacionesFijas();

            alert('Copia restaurada correctamente');

        }catch(error){

            alert('Error al restaurar la copia');
        }
    };

    lector.readAsText(archivo);

    event.target.value = '';
}

function exportarPDF(){

    if(registros.length === 0){

        alert('No hay registros para exportar');
        return;
    }

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF('landscape');

    const filas = registros.map(r => [

        r.fecha,
        r.actuacion,
        r.factor,
        r.descripcion,
        r.zona,
        r.observaciones

    ]);

    doc.autoTable({

        head:[[
            "Fecha",
            "Actuación",
            "Factor",
            "Descripción",
            "Aula/Zona",
            "Observaciones"
        ]],

        body:filas,

        styles:{
            fontSize:8,
            halign:'center',
            valign:'middle'
        },

        headStyles:{
            fillColor:[68,114,196]
        }

    });

    doc.save('registro_actuaciones.pdf');
}

function limpiarCampos(){

    document.getElementById('actuacion').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('zona').value = '';
    document.getElementById('observaciones').value = '';
}

document.getElementById('busqueda').addEventListener('keyup', function(){

    const texto = this.value.toLowerCase();

    document.querySelectorAll('#tablaBody tr').forEach(tr => {

        const contenido = tr.innerText.toLowerCase();

        tr.style.display = contenido.includes(texto)
            ? ''
            : 'none';
    });
});

function actualizarSugerencias(){

    actualizarLista('descripcion','listaDescripcion');
    actualizarLista('zona','listaZona');
    actualizarLista('observaciones','listaObservaciones');
    inicializarActuacionesFijas();
}

function actualizarLista(campo, listaId){

    const lista = document.getElementById(listaId);

    const frecuencia = {};

    registros.forEach(r => {

        const valor = (r[campo] || '').trim();

        if(valor !== ''){

            frecuencia[valor] = (frecuencia[valor] || 0) + 1;
        }
    });

    const ordenados = Object.entries(frecuencia)

    .sort((a,b) => b[1] - a[1])

    .map(e => e[0]);

    lista.innerHTML = '';

    ordenados.forEach(valor => {

        const option = document.createElement('option');

        option.value = valor;

        lista.appendChild(option);
    });
}

</script>
