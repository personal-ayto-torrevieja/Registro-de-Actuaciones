<script>

let registros = JSON.parse(localStorage.getItem('registros')) || [];
let filaSeleccionada = null;
function formatearFecha(fechaISO){

    if(!fechaISO) return '';

    if(fechaISO.includes(' a ')){

        const partes = fechaISO.split(' a ');

        return partes.map(f =>
            new Date(f).toLocaleDateString('es-ES')
        ).join(' - ');
    }

    return new Date(fechaISO).toLocaleDateString('es-ES');
}
const actuacionesPorFactor = {

    '1.1: Actividad Extraordinaria': [
        'Gestión sanitaria básica',
        'Supervisión del alumnado',
        'Comunicación con familias',
        'Gestión de objetos perdidos',
        'Recepción y entrega de materiales personales'
    ],

    '1.2: Funciones Adicionales': [
        'Organización de eventos',
        'Adecuación de aulas',
        'Instalación de equipamiento',
        'Apoyo administrativo',
        'Control de sistemas',
        'Apoyo en limpieza',
        'Primeros auxilios',
        'Gestión de residuos',
        'Control de suministros'
    ],

    '1.3: Iniciativa y Mejora grupal': [
        'Participación en reuniones y coordinación interna',
        'Propuestas de mejora del servicio de conserjería',
        'Gestión de incidencias del profesorado',
        'Coordinación con dirección y personal municipal',
        'Mejora en la gestión de llaves y accesos'
    ]
};

renderTabla();
actualizarSugerencias();
inicializarActuacionesFijas();

function inicializarActuacionesFijas(){

    const lista = document.getElementById('listaActuacion');

    const actuacionesUnicas = [
        ...new Set([
            ...Object.values(actuacionesPorFactor).flat(),
            ...registros.map(r => r.actuacion).filter(Boolean)
        ])
    ];

    lista.innerHTML = '';

    actuacionesUnicas.forEach(actuacion => {

        const option = document.createElement('option');

        option.value = actuacion;

        lista.appendChild(option);
    });
}

function detectarFactorAutomatico(){

    const actuacion = document
    .getElementById('actuacion')
    .value
    .trim();

    const selectFactor = document.getElementById('factor');

    for(const factor in actuacionesPorFactor){

        if(actuacionesPorFactor[factor].includes(actuacion)){

            selectFactor.value = factor;
            return;
        }
    }
}



document.getElementById('fecha').addEventListener('change', function(){

    const usarPeriodo = document.getElementById('usarPeriodo').checked;

    if(!usarPeriodo){
        document.getElementById('numeroActuaciones').value = '1';
    }
});

document.getElementById('usarPeriodo').addEventListener('change', function(){

    const bloque = document.getElementById('bloquePeriodo');

    bloque.style.display = this.checked ? 'flex' : 'none';

    if(!this.checked){
        document.getElementById('numeroActuaciones').value = '1';
    }
});


document
.getElementById('actuacion')
.addEventListener('input', detectarFactorAutomatico);

function agregarRegistro(){

    const fecha = document.getElementById('fecha').value;
    const usarPeriodo = document.getElementById('usarPeriodo').checked;
    const fechaInicio = document.getElementById('fechaInicio').value;
    const fechaFin = document.getElementById('fechaFin').value;
    const actuacion = document.getElementById('actuacion').value.trim();
    const descripcion = document.getElementById('descripcion').value.trim();
    const zona = document.getElementById('zona').value.trim();
    const numeroActuaciones = document.getElementById('numeroActuaciones').value || '1';
    const factor = document.getElementById('factor').value;

    if(!actuacion){
        alert('Debes introducir una actuación');
        return;
    }

    registros.push({
        fecha: usarPeriodo ? `${fechaInicio} a ${fechaFin}` : fecha,
        actuacion,
        factor,
        descripcion,
        zona,
        numeroActuaciones
    });

    guardarDatos();
    renderTabla();
    actualizarSugerencias();
    limpiarCampos();
}

function renderTabla(){

    const body = document.getElementById('tablaBody');
    body.innerHTML = '';

    registros.forEach((r,index) => {

        const tr = document.createElement('tr');

        tr.innerHTML = `
            <td>${formatearFecha(r.fecha)}</td>
            <td>${r.actuacion}</td>
            <td>${r.factor}</td>
            <td>${r.descripcion}</td>
            <td>${r.zona}</td>
            <td>${r.numeroActuaciones || 1}</td>
        `;

        tr.onclick = () => seleccionarFila(index,tr);

        body.appendChild(tr);
    });

    document.getElementById('contador').innerText =
    `Total registros: ${registros.length}`;
}

function seleccionarFila(index,tr){

    document.querySelectorAll('tbody tr').forEach(f => {
        f.style.background='';
    });

    tr.style.background='#4472c4';

    filaSeleccionada = index;
}

function eliminarSeleccionado(){

    if(filaSeleccionada === null){
        alert('Selecciona un registro');
        return;
    }

    registros.splice(filaSeleccionada,1);

    filaSeleccionada = null;

    guardarDatos();
    renderTabla();
    actualizarSugerencias();
}

function ordenarPorFecha(){

    registros.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    guardarDatos();
    renderTabla();
}



function guardarDatos(descargar = false){

    localStorage.setItem('registros',JSON.stringify(registros));

    if(descargar){

        const datos = JSON.stringify(registros, null, 2);

        const blob = new Blob([datos], {
            type:'application/json'
        });

        const enlace = document.createElement('a');

        enlace.href = URL.createObjectURL(blob);
        enlace.download = 'registro.json';

        document.body.appendChild(enlace);

        enlace.click();

        document.body.removeChild(enlace);

        URL.revokeObjectURL(enlace.href);
    }
}

function restaurarCopia(event){

    const archivo = event.target.files[0];

    if(!archivo){
        return;
    }

    const lector = new FileReader();

    lector.onload = function(e){

        try{

            const datos = JSON.parse(e.target.result);

            if(!Array.isArray(datos)){
                alert('El archivo no es válido');
                return;
            }

            registros = datos;

            localStorage.setItem(
                'registros',
                JSON.stringify(registros)
            );

            renderTabla();
            actualizarSugerencias();
            inicializarActuacionesFijas();

            alert('Copia restaurada correctamente');

        }catch(error){

            alert('Error al restaurar la copia');
        }
    };

    lector.readAsText(archivo);

    event.target.value = '';
}



function limpiarCampos(){

    document.getElementById('actuacion').value = '';
    document.getElementById('descripcion').value = '';
    document.getElementById('zona').value = '';
    document.getElementById('numeroActuaciones').value = '1';
}

document.getElementById('busqueda').addEventListener('keyup', function(){

    const texto = this.value.toLowerCase();

    document.querySelectorAll('#tablaBody tr').forEach(tr => {

        const contenido = tr.innerText.toLowerCase();

        tr.style.display = contenido.includes(texto)
            ? ''
            : 'none';
    });
});

function actualizarSugerencias(){

    actualizarLista('descripcion','listaDescripcion');
    actualizarLista('zona','listaZona');
    inicializarActuacionesFijas();
}

function actualizarLista(campo, listaId){

    const lista = document.getElementById(listaId);

    const frecuencia = {};

    registros.forEach(r => {

        const valor = (r[campo] || '').trim();

        if(valor !== ''){

            frecuencia[valor] = (frecuencia[valor] || 0) + 1;
        }
    });

    const ordenados = Object.entries(frecuencia)

    .sort((a,b) => b[1] - a[1])

    .map(e => e[0]);

    lista.innerHTML = '';

    ordenados.forEach(valor => {

        const option = document.createElement('option');

        option.value = valor;

        lista.appendChild(option);
    });
}

</script>

function generarResumenActuaciones(){

    const resumen = {};

    registros.forEach(r => {

        const clave = `${r.actuacion}|||${r.factor}`;

        const cantidad = parseInt(r.numeroActuaciones || 1);

        if(!resumen[clave]){

            resumen[clave] = {
                actuacion: r.actuacion,
                factor: r.factor,
                total: 0
            };
        }

        resumen[clave].total += cantidad;
    });

    return Object.values(resumen);
}

        wsRegistros,

    const modalExistente = document.getElementById('modalEliminarTodo');

        modalExistente.remove();
    }

    const modal = document.createElement('div');

    modal.id = 'modalEliminarTodo';

    modal.innerHTML = `

        <div style="
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.55);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:99999;
            backdrop-filter:blur(4px);
        ">

            <div style="
                width:380px;
                background:#1e293b;
                border-radius:24px;
                padding:30px;
                border:1px solid rgba(255,255,255,.08);
                box-shadow:none;
            ">

                <div style="text-align:center;margin-bottom:25px;">

                    <div style="
                        width:70px;
                        height:70px;
                        border-radius:50%;
                        background:#4472c4;
                        display:flex;
                        align-items:center;
                        justify-content:center;
                        margin:auto;
                        margin-bottom:15px;
                    ">

                        <i class="fa-solid fa-trash"
                        style="
                            color:white;
                            font-size:28px;
                        "></i>

                    </div>

                    <div style="
                        color:white;
                        font-size:24px;
                        font-weight:700;
                    ">
                        Eliminar registros
                    </div>

                    <div style="
                        color:#94a3b8;
                        font-size:13px;
                        margin-top:6px;
                    ">
                        Se eliminarán todos los registros guardados
                    </div>

                </div>

                <button
                id="confirmarEliminarTodo"
                style="
                    width:100%;
                    border:none;
                    background:#4472c4;
                    color:white;
                    padding:14px;
                    border-radius:16px;
                    font-size:15px;
                    font-weight:600;
                    cursor:pointer;
                    margin-bottom:10px;
                ">

                    <i class="fa-solid fa-trash"
                    style="margin-right:4px;"></i>

                    Eliminar todo

                </button>

                <button
                id="cancelarEliminarTodo"
                style="
                    width:100%;
                    border:none;
                    background:transparent;
                    color:#94a3b8;
                    padding:12px;
                    cursor:pointer;
                    font-size:13px;
                ">

                    Cancelar

                </button>

            </div>

        </div>
    `;

    document.body.appendChild(modal);

    document
    .getElementById('confirmarEliminarTodo')
    .onclick = () => {

        registros = [];

        localStorage.removeItem('registros');

        filaSeleccionada = null;

        renderTabla();

        actualizarSugerencias();

        document
        .getElementById('dropdownMenu')
        .classList.remove('show');

        modal.remove();
    };

    document
    .getElementById('cancelarEliminarTodo')
    .onclick = () => {

        modal.remove();
    };
}
</script>

<script>
function actualizarFechaHora(){
    const ahora = new Date();

    const fecha = ahora.toLocaleDateString('es-ES', {
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
    });

    const hora = ahora.toLocaleTimeString('es-ES');

    document.getElementById('fechaHoraActual').innerHTML =
        fecha.charAt(0).toUpperCase() + fecha.slice(1) + ' - ' + hora;
}

setInterval(actualizarFechaHora,1000);
actualizarFechaHora();
</script>

</body>
